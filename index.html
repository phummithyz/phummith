<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome To My Bio! | phummithyz</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
</head>

<body>

    <div id="overlay">
        <h1 class="glow-text">phummithyz</h1>
        <button id="startBtn">Click to Enter</button>
    </div>

    <div class="snow-wrapper">
        <script>
            for (let i = 0; i < 50; i++) {
                document.write('<div class="snowflake"></div>');
            }
        </script>
    </div>

    <div class="welcome-container">
        <h1 class="glow-text">Welcome To My Bio!, phummithyz</h1>

        <a href="https://www.instagram.com/phummithyz/" target="_blank" class="ig-link">
            <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png" alt="IG Logo"
                class="ig-custom-logo">
            <span>My Instagram</span>
        </a>

        <div class="image-gallery">
            <div class="swiper mySwiper">
                <div class="swiper-wrapper">
                    <div class="swiper-slide">
                        <div class="image-item"><img src="image_0.png" alt="Image 1"></div>
                    </div>
                    <div class="swiper-slide">
                        <div class="image-item"><img src="image_1.png" alt="Image 2"></div>
                    </div>
                    <div class="swiper-slide">
                        <div class="image-item"><img src="image_2.png" alt="Image 3"></div>
                    </div>
                </div>
                <div class="swiper-button-next"></div>
                <div class="swiper-button-prev"></div>
                <div class="swiper-pagination"></div>
            </div>
        </div>
    </div>

    <audio id="myAudio" src="music.mp3" loop></audio>

    <div class="music-player-container">
        <div class="volume-control">
            <input type="range" id="volumeSlider" min="0" max="1" step="0.1" value="0.5">
        </div>
        <button id="musicBtn" class="music-control-btn">
            <div class="disc-logo">
                <img src="muic.png" alt="Music Logo" class="custom-disc-img">
            </div>
            <div class="status-icon">
                <i class="fas fa-play"></i>
            </div>
        </button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>
        const audio = document.getElementById('myAudio');
        const btn = document.getElementById('musicBtn');
        const statusIcon = document.querySelector('.status-icon i');
        const volumeSlider = document.getElementById('volumeSlider');
        const overlay = document.getElementById('overlay');
        const startBtn = document.getElementById('startBtn');

        // ตั้งค่าสไลด์ Swiper
        var swiper = new Swiper(".mySwiper", {
            loop: true,
            grabCursor: true,
            navigation: { nextEl: ".swiper-button-next", prevEl: ".swiper-button-prev" },
            pagination: { el: ".swiper-pagination", clickable: true },
            autoplay: { delay: 4000, disableOnInteraction: false }
        });

        // ฟังก์ชันเริ่มเล่นเพลงและเข้าเว็บ
        startBtn.addEventListener('click', function () {
            audio.play().then(() => {
                btn.classList.add('playing');
                statusIcon.className = 'fas fa-pause';
                overlay.style.opacity = '0';
                setTimeout(() => { overlay.style.display = 'none'; }, 800);
            }).catch(err => {
                console.log("Playback failed", err);
                overlay.style.display = 'none';
            });
        });

        // ปุ่ม Play/Pause
        btn.addEventListener('click', function (e) {
            e.stopPropagation();
            if (audio.paused) {
                audio.play();
                btn.classList.add('playing');
                statusIcon.className = 'fas fa-pause';
            } else {
                audio.pause();
                btn.classList.remove('playing');
                statusIcon.className = 'fas fa-play';
            }
        });

        // ปรับเสียง
        volumeSlider.addEventListener('input', function () { audio.volume = this.value; });

        // ตั้งค่าหิมะแบบสุ่ม
        const snowflakes = document.querySelectorAll('.snowflake');
        snowflakes.forEach((snow) => {
            snow.style.left = Math.random() * 100 + '%';
            snow.style.animationDelay = Math.random() * 10 + 's';
            snow.style.animationDuration = (Math.random() * 5 + 7) + 's';
            const size = Math.random() * 4 + 2;
            snow.style.width = size + 'px';
            snow.style.height = size + 'px';
            snow.style.opacity = Math.random();
        });
    </script>
</body>

</html>
