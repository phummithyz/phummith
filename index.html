<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | phummithyz</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="overlay"
        style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); color:#fff; display:flex; flex-direction:column; justify-content:center; align-items:center; z-index:9999; transition: 0.8s; backdrop-filter: blur(10px);">
        <h1 class="glow-text" style="margin-bottom: 20px; font-family: sans-serif;">phummithyz</h1>
        <button id="startBtn"
            style="padding: 15px 40px; font-size: 1.2rem; cursor: pointer; background: transparent; border: 2px solid #fff; color: #fff; border-radius: 50px; font-weight: bold; transition: 0.3s; text-transform: uppercase; letter-spacing: 2px;">
            Click to Enter
        </button>
    </div>

    <div class="snow-wrapper">
        <script>
            for (let i = 0; i < 50; i++) {
                document.write('<div class="snowflake"></div>');
            }
        </script>
    </div>

    <div class="welcome-container">
        <h1 class="glow-text">Welcome, phummithyz</h1>
        <a href="https://www.instagram.com/phummithyz/" target="_blank" class="ig-link">
            <i class="fa-brands fa-instagram"></i>
            <span>Follow me on Instagram</span>
        </a>
        <div class="image-gallery">
            <div class="image-item"><img src="image_0.png" alt="Image 1"></div>
            <div class="image-item"><img src="image_1.png" alt="Image 2"></div>
            <div class="image-item"><img src="image_2.png" alt="Image 3"></div>
        </div>
    </div>

    <audio id="myAudio" src="music.mp3" loop></audio>

    <div class="music-player-container">
        <div class="volume-control">
            <input type="range" id="volumeSlider" min="0" max="1" step="0.1" value="0.5">
        </div>
        <button id="musicBtn" class="music-control-btn">
            <div class="disc-logo">
                <img src="muic.png" alt="Music Logo" class="custom-disc-img">
            </div>
            <div class="status-icon">
                <i class="fas fa-play"></i>
            </div>
        </button>
    </div>

    <script>
        // ประกาศตัวแปรทั้งหมดไว้ที่เดียว
        const audio = document.getElementById('myAudio');
        const btn = document.getElementById('musicBtn');
        const statusIcon = document.querySelector('.status-icon i');
        const volumeSlider = document.getElementById('volumeSlider');
        const overlay = document.getElementById('overlay');
        const startBtn = document.getElementById('startBtn');

        // ฟังก์ชันเล่นเพลง
        function playMusic() {
            audio.play().then(() => {
                btn.classList.add('playing');
                statusIcon.className = 'fas fa-pause';
                overlay.style.opacity = '0';
                setTimeout(() => { overlay.style.display = 'none'; }, 800);
            }).catch(err => {
                console.log("Playback failed:", err);
                overlay.style.display = 'none';
            });
        }

        // กดปุ่ม Start
        startBtn.addEventListener('click', playMusic);

        // ปุ่ม Play/Pause ในเครื่องเล่น
        btn.addEventListener('click', function (e) {
            e.stopPropagation();
            if (audio.paused) {
                audio.play();
                btn.classList.add('playing');
                statusIcon.className = 'fas fa-pause';
            } else {
                audio.pause();
                btn.classList.remove('playing');
                statusIcon.className = 'fas fa-play';
            }
        });

        // ปรับระดับเสียง
        volumeSlider.addEventListener('input', function () {
            audio.volume = this.value;
        });

        // ตั้งค่าหิมะ
        const snowflakes = document.querySelectorAll('.snowflake');
        snowflakes.forEach((snow) => {
            snow.style.left = Math.random() * 100 + '%';
            snow.style.animationDelay = Math.random() * 10 + 's';
            snow.style.animationDuration = (Math.random() * 5 + 7) + 's';
            const size = Math.random() * 4 + 2;
            snow.style.width = size + 'px';
            snow.style.height = size + 'px';
            snow.style.opacity = Math.random();
        });
    </script>
</body>

</html>
